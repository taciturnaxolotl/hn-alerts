name: Deploy HN Alerts

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: taciturnaxolotl/dots/.github/workflows/deploy-service.yml@main
    with:
      service: hn-alerts
      health_url: https://hn.dunkirk.sh/health
      db_path: /var/lib/hn-alerts/data/hn-alerts.db
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
